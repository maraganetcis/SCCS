<!doctype html>
<html lang="ko">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCCS - 신촌채팅서비스</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=4" />
    <style>
      [hidden] { display: none !important; }
    </style>
  </head>
  <body>
    <section id="authGate" class="gate">
      <div class="gate-card">
        <h1>SCCS 시작하기</h1>
        <p>로그인 후 친구와 채팅하세요.</p>
        <input id="authEmail" type="email" placeholder="이메일" />
        <input id="authPassword" type="password" placeholder="비밀번호" />
        <div class="row">
          <button id="loginBtn">이메일 로그인</button>
          <button id="signupBtn" class="ghost">이메일 회원가입</button>
        </div>
        <button id="googleBtn" class="google">Google로 계속하기</button>
        <div id="authNotice" class="gate-notice" aria-live="polite"></div>
      </div>
    </section>

    <section id="usernameGate" class="gate hidden" hidden>
      <div class="gate-card">
        <h1>아이디 설정</h1>
        <p>설정 후 변경 가능합니다. 중복된 아이디는 사용할 수 없습니다.</p>
        <input id="onboardUsername" type="text" placeholder="아이디 (예: shinchon_tecnologies)" />
        <input id="onboardDisplayName" type="text" placeholder="이름 or 표시명" />
        <button id="completeOnboardingBtn">채팅 시작하기</button>
        <div id="onboardNotice" class="gate-notice" aria-live="polite"></div>
      </div>
    </section>

    <div class="app-shell hidden" id="appShell" hidden>
      <aside class="left-panel glass">
        <div class="brand">SCCS</div>
        <div class="user-card">
          <div class="avatar" id="myAvatar">🙂</div>
          <div>
            <h2 id="myDisplayName">-</h2>
            <p id="myTag">@-</p>
          </div>
        </div>

        <div class="section-title">친구</div>
        <div class="friend-list" id="friendList"></div>
      </aside>

      <main class="chat-panel glass">
        <header class="chat-header">
          <div>
            <h1 id="chatTitle">채팅을 선택하세요</h1>
            <p id="chatSubtitle">친구를 추가하고 대화를 시작하세요.</p>
          </div>
          <button id="openMyPage" class="ghost">마이페이지</button>
        </header>

        <section class="message-area" id="messageArea"></section>

        <footer class="message-input-wrap">
          <input id="messageInput" type="text" placeholder="메시지를 입력하세요..." />
          <button id="sendBtn">전송</button>
        </footer>
      </main>

      <aside class="right-panel glass">
        <section>
          <h3>친구 추가</h3>
          <div class="row">
            <input id="friendUsernameInput" type="text" placeholder="친구 아이디 입력" />
            <button id="addFriendBtn">추가</button>
          </div>
        </section>

        <section>
          <h3>알림</h3>
          <div id="toast" class="toast">준비 완료</div>
        </section>
      </aside>
    </div>

    <footer class="copyright">copyright © 2026 SCT by Synox Studios</footer>

    <dialog id="myPageDialog">
      <form method="dialog" class="profile-form">
        <h2>마이페이지</h2>
        <label>
          이름 추가 / 편집
          <input type="text" id="mpDisplayName" placeholder="표시 이름" />
        </label>
        <label>
          아이디 편집
          <input type="text" id="mpUsername" placeholder="아이디" />
        </label>
        <button id="saveIdentityBtn">이름/아이디 저장</button>

        <label>
          상태 메시지
          <input type="text" id="mpBio" placeholder="오늘도 즐거운 채팅!" />
        </label>
        <label>
          아바타 이모지
          <input type="text" maxlength="2" id="mpAvatar" placeholder="😎" />
        </label>
        <label>
          테마 색상
          <input type="color" id="mpTheme" value="#6e61ff" />
        </label>
        <button id="saveProfileBtn" class="ghost">프로필 편집 저장</button>

        <menu>
          <button value="cancel" class="ghost">닫기</button>
          <button id="logoutBtn" class="danger">로그아웃</button>
        </menu>
      </form>
    </dialog>

    <script type="module" src="app.js?v=4"></script>
  </body>
</html>
